---
- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true

  tasks:
    - name: Get my user
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_facts['env']['SUDO_USER'] | default(ansible_facts['user_id']) }}"

    - name: Remove LibreOffice packages
      ansible.builtin.dnf:
        name:
          - unoconv
          - "libreoffice*"
        state: absent
        autoremove: true

    - name: Remove a few default GNOME applications
      ansible.builtin.dnf:
        name:
          - gnome-logs
          - rhythmbox
        state: absent
        autoremove: true

    - name: Upgrade all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Enable Ghostty COPR repository
      community.general.copr:
        name: scottames/ghostty
        state: enabled

    - name: Enable mise COPR repository
      community.general.copr:
        name: jdxcode/mise
        state: enabled

    - name: Install packages
      ansible.builtin.dnf:
        name:
          - btop
          - vim
          - neovim
          - tmux
          - ffmpeg-free
          - gnome-console
          - fzf
          - tldr
          - bat
          - cascadia-code-nf-fonts
          - helix
          - podman-compose
          - fish
          - difftastic
          - k9s
          - ghostty
          - mise
          - uv
        state: present

    - name: Install starship
      ansible.builtin.shell: curl -sS https://starship.rs/install.sh | sh -s -- --yes
      args:
        creates: /usr/local/bin/starship

    - name: Change shell to fish
      ansible.builtin.user:
        name: "{{ remote_regular_user }}"
        shell: /usr/bin/fish

    - name: Install Flatpak packages
      community.general.flatpak:
        name:
          - com.mattjakeman.ExtensionManager
          - com.github.tchx84.Flatseal
          - rest.insomnia.Insomnia
          - io.github.alainm23.planify
          - org.gnome.gitlab.somas.Apostrophe
          - dev.bragefuglseth.Keypunch
          - io.missioncenter.MissionCenter
        state: present

    - name: Install gnome-extensions-cli
      become: false
      ansible.builtin.command:
        cmd: uv tool install gnome-extensions-cli
        creates: "{{ ansible_facts['env']['HOME'] }}/.local/bin/gext"

    - name: Install GNOME Shell extensions
      become: false
      ansible.builtin.command:
        cmd: "gext --filesystem install {{ item }}"
      loop:
        - blur-my-shell@aunetx
        - weatheroclock@CleoMenezesJr.github.io
        - runcat@kolesnikov.se
        - drive-menu@gnome-shell-extensions.gcampax.github.com
        - gTile@vibou
        - monitor@astraext.github.io

